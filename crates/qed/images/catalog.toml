# yah-qed bundled image catalog.
#
# Each `[[image]]` entry is a yah-managed container image. Either `base`
# (an upstream image, e.g. `rust:1-slim-bookworm`) or `extends` (another
# catalog entry by name) must be set. `digests` is empty in source; the
# release pipeline injects per-arch SHA-256 digests at build time.
#
# Per-camp entries at `.yah/qed/images/<name>/` override these by name.
# See `.yah/docs/working/W148-qed-container-builds.md`.
#
[[image]]
name        = "yah-base"
base        = "debian:bookworm-slim"
description = "Minimal shell scripts; cheap pulls"
tools       = ["bash", "git", "curl", "ca-certificates"]

[[image]]
name        = "yah-rust"
base        = "rust:1-slim-bookworm"
description = "Cargo workspaces — yah-base + cargo, rustc, build-essential"
tools       = ["bash", "git", "curl", "cargo", "rustc", "build-essential", "pkg-config"]

[[image]]
name        = "yah-bun"
base        = "oven/bun:debian"
description = "Frontend builds, TS scripts"
tools       = ["bash", "git", "curl", "bun", "node"]

[[image]]
name        = "yah-rust-bun"
extends     = "yah-rust"
description = "Default for the yah workspace itself (Rust + frontend) — direct heir of forge-minimal"
tools       = ["bash", "git", "curl", "cargo", "rustc", "bun", "node"]

[[image]]
name        = "yah-python"
base        = "python:3-slim-bookworm"
description = "Python apps"
tools       = ["bash", "git", "curl", "pip", "build-essential"]

[[image]]
name        = "yah-cuda"
base        = "nvidia/cuda:12-runtime-ubuntu22.04"
description = "GPU workloads — built only when a host advertises GPU capability"
tools       = ["bash", "git", "curl", "nvcc", "cudnn"]

[[image]]
name        = "yah-node"
base        = "node:lts-bookworm"
description = "npm-ecosystem builds"
tools       = ["bash", "git", "curl", "npm", "pnpm", "yarn"]

[[image]]
name        = "yah-yubaba"
base        = "debian:bookworm-slim"
description = "Pond-tier yubaba+kamaji container (tini PID 1, both binaries baked in) — see W154"
tools       = ["tini", "yubaba", "kamaji"]

[[image]]
name        = "yah-miniflare"
base        = "oven/bun:1-debian"
description = "Pond-tier miniflare (workerd) container — bun + tini + baked miniflare; Worker bundle bind-mounted at runtime (R455-F1; W180)"
tools       = ["tini", "bun", "miniflare"]

[[image]]
name        = "yah-cloud-runner"
base        = "debian:bookworm-slim"
description = "Cloud-tier almanac runner (almanac-serve under tini) behind runner.yah.dev — R330-F11, W059"
tools       = ["tini", "almanac-serve"]

[[image]]
name        = "rusty-v8-musl-builder"
base        = "alpine:edge"
description = "Expensive-leg builder for the rusty-v8-musl transform recipe (V8 from source → musl static lib) — R546. Alpine native-musl toolchain (no cross, no depot_tools); builds per-arch under the matching --platform."
tools       = ["bash", "git", "curl", "cargo", "rustc", "gn", "samurai", "clang-22", "lld", "python3", "build-v8.sh"]
